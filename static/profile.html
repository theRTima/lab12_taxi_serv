<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Taxi Service</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-wide">
  <div class="card medium">
    <h1>Profile</h1>
    <p class="subtitle">Account settings</p>
    <nav class="nav" id="nav"></nav>
    <div id="error" class="error" role="alert"></div>
    <div id="success" class="success" role="status"></div>

    <section class="section">
      <h2>Edit name</h2>
      <form id="name-form">
        <label for="email">Email</label>
        <input type="email" id="email" disabled>
        <label for="name">Name</label>
        <input type="text" id="name" required maxlength="255">
        <button type="submit">Save name</button>
      </form>
    </section>

    <section class="section">
      <h2>Change password</h2>
      <form id="password-form">
        <label for="current">Current password</label>
        <input type="password" id="current" required autocomplete="current-password">
        <label for="new">New password</label>
        <input type="password" id="new" required minlength="6" autocomplete="new-password">
        <button type="submit">Change password</button>
      </form>
    </section>
  </div>
  <script src="/static/app.js"></script>
  <script>
    const errorEl = document.getElementById('error');
    const successEl = document.getElementById('success');

    initPage({
      onReady: async function (user) {
        document.getElementById('email').value = user.email;
        document.getElementById('name').value = user.name;
      },
    });

    document.getElementById('name-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError(errorEl);
      try {
        await api('/auth/me', {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ name: document.getElementById('name').value }),
        });
        showSuccess(successEl, 'Name updated');
      } catch (err) {
        showError(errorEl, err.message);
      }
    });

    document.getElementById('password-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError(errorEl);
      try {
        await api('/auth/me/password', {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({
            current_password: document.getElementById('current').value,
            new_password: document.getElementById('new').value,
          }),
        });
        showSuccess(successEl, 'Password changed');
        e.target.reset();
      } catch (err) {
        showError(errorEl, err.message);
      }
    });
  </script>
</body>
</html>
