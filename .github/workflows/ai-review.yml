name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    name: AI Review via Groq
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
          git diff refs/remotes/origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Diff size: $(wc -c < pr_diff.txt) bytes"

      - name: Build prompt
        run: |
          python3 - <<'EOF'
          import json
          diff = open('pr_diff.txt').read(12000)
          prompt = (
              "You are a code reviewer. Analyze this PR diff and provide:\n"
              "1. Summary of changes (2-3 sentences)\n"
              "2. Potential issues or bugs\n"
              "3. Suggestions for improvement\n"
              "\nDiff:\n" + diff
          )
          with open('prompt.json', 'w') as f:
              json.dump({"prompt": prompt}, f)
          EOF

      - name: AI Review via Groq
        id: ai_review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          PROMPT=$(python3 -c "import json; print(json.load(open('prompt.json'))['prompt'])" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          echo "Diff length: $(wc -c < pr_diff.txt) chars"

          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "content-type: application/json" \
            -d "{
              \"model\": \"llama-3.3-70b-versatile\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": $PROMPT
              }]
            }")

          echo "API Response: $RESPONSE"

          echo $RESPONSE | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'error' in data:
              print('API ERROR:', data['error'])
              sys.exit(1)
          print(data['choices'][0]['message']['content'])
          " > ai_comment.txt

      - name: Post comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(cat ai_comment.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 AI Code Review

          $COMMENT

          ---
          *Generated by Groq AI (Llama 3.3)*"
