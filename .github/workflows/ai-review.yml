name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    name: AI Review via Gemini
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
          git diff refs/remotes/origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Diff size: $(wc -c < pr_diff.txt) bytes"

      - name: AI Review via Groq
        id: ai_review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          DIFF=$(cat pr_diff.txt | head -c 12000)
          echo "Diff length: $(echo $DIFF | wc -c) chars"

          # Escape diff for JSON
          DIFF_ESCAPED=$(echo "$DIFF" | python3 -c "
          import sys, json
          print(json.dumps(sys.stdin.read()))
          ")

          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "content-type: application/json" \
            -d "{
              \"model\": \"llama3-8b-8192\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": $DIFF_ESCAPED
              }]
            }")

          echo "API Response: $RESPONSE"

          echo $RESPONSE | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'error' in data:
              print('API ERROR:', data['error'])
              sys.exit(1)
          print(data['choices'][0]['message']['content'])
          " > ai_comment.txt

      - name: Post comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(cat ai_comment.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 AI Code Review

          $COMMENT

          ---
          *Generated by Gemini AI*"