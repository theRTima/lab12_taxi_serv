name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    name: AI Review via Gemini
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: AI Review via Gemini
        id: ai_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(cat pr_diff.txt | head -c 12000)
          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "content-type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"You are a code reviewer. Analyze this PR diff:\n1. Summary of changes\n2. Potential issues\n3. Suggestions\n\nDiff:\n$DIFF\"
                }]
              }]
            }")
          echo $RESPONSE | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['candidates'][0]['content']['parts'][0]['text'])
          " > ai_comment.txt

      - name: Post comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(cat ai_comment.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 AI Code Review

          $COMMENT

          ---
          *Generated by Gemini AI*"